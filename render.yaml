# Render Blueprint — Neon GTM Command WALL (Node web service + live Claude scoring)
# Deploy: push this folder to GitHub, then Render → New + → Blueprint → pick the repo.
# After it deploys, set ANTHROPIC_API_KEY in the dashboard (Environment tab).
services:
  - type: web
    name: neon-gtm-command-wall
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: XAI_API_KEY
        sync: false   # set this in the Render dashboard — never commit the key
      - key: XAI_MODEL
        value: grok-3-mini   # override if your account doesn't have this model
